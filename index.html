<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barcode Scanner Kasir</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
  <style>
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .slide-in {
      animation: slideIn 0.3s ease-out;
    }
    @keyframes pulse-ring {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .pulse-scan {
      animation: pulse-ring 1.5s infinite;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900">
  <div class="w-full h-full flex flex-col overflow-auto app-wrapper">
   <!-- Header -->
   <header class="bg-gradient-to-r from-blue-600 to-blue-700 text-white px-4 py-4 shadow-lg sticky top-0 z-10">
    <div class="flex items-center justify-between">
     <div class="flex items-center gap-2">
      <i data-lucide="scan" class="w-6 h-6"></i>
      <h1 class="text-xl font-bold">Scanner Kasir</h1>
     </div><button id="toggleMode" class="bg-white text-blue-600 px-3 py-1 rounded-full text-sm font-semibold hover:bg-blue-50 transition"> Mode: Scanner </button>
    </div>
   </header><!-- Main Content -->
   <main class="flex-1 flex flex-col overflow-hidden">
    <!-- Scanner View -->
    <div id="scannerView" class="flex-1 flex flex-col overflow-hidden">
     <!-- Camera Container -->
     <div class="flex-1 relative bg-black overflow-hidden flex items-center justify-center">
      <video id="cameraFeed" class="w-full h-full object-cover" playsinline></video><!-- Scanner Frame -->
      <div class="absolute inset-0 flex items-center justify-center">
       <div class="relative w-80 h-48">
        <!-- Border frame -->
        <div class="absolute inset-0 border-4 border-green-500 rounded-lg"></div><!-- Corner decorations -->
        <div class="absolute -top-2 -left-2 w-6 h-6 border-t-4 border-l-4 border-green-500 rounded-tl-lg"></div>
        <div class="absolute -top-2 -right-2 w-6 h-6 border-t-4 border-r-4 border-green-500 rounded-tr-lg"></div>
        <div class="absolute -bottom-2 -left-2 w-6 h-6 border-b-4 border-l-4 border-green-500 rounded-bl-lg"></div>
        <div class="absolute -bottom-2 -right-2 w-6 h-6 border-b-4 border-r-4 border-green-500 rounded-br-lg"></div><!-- Scan line -->
        <div class="absolute top-1/2 left-0 right-0 h-0.5 bg-gradient-to-r from-transparent via-green-500 to-transparent pulse-scan"></div>
       </div>
      </div><!-- Overlay Info -->
      <div class="absolute bottom-4 left-0 right-0 text-center text-white">
       <p class="text-sm font-medium">Arahkan barcode ke kamera</p>
      </div>
     </div><!-- Manual Input Section -->
     <div class="bg-slate-800 border-t border-slate-700 p-4">
      <div class="flex gap-2">
       <input type="text" id="manualBarcode" placeholder="Atau ketik barcode di sini..." class="flex-1 px-3 py-2 bg-slate-700 text-white rounded border border-slate-600 focus:border-blue-500 focus:outline-none"> <button id="submitManual" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded font-semibold transition flex items-center gap-2"> <i data-lucide="plus" class="w-4 h-4"></i> Tambah </button>
      </div>
     </div>
    </div><!-- Transaction List View -->
    <div id="listView" class="hidden flex-1 flex flex-col overflow-hidden bg-slate-900">
     <!-- Stats Header -->
     <div class="bg-slate-800 border-b border-slate-700 p-4 grid grid-cols-3 gap-3">
      <div class="bg-slate-700 rounded-lg p-3">
       <p class="text-xs text-slate-400">Total Item</p>
       <p id="totalItems" class="text-2xl font-bold text-white">0</p>
      </div>
      <div class="bg-slate-700 rounded-lg p-3">
       <p class="text-xs text-slate-400">Total Harga</p>
       <p id="totalPrice" class="text-2xl font-bold text-green-400">Rp 0</p>
      </div>
      <div class="bg-slate-700 rounded-lg p-3">
       <p class="text-xs text-slate-400">Action</p><button id="resetBtn" class="text-xs bg-red-600 hover:bg-red-700 text-white px-2 py-1 rounded mt-1 transition"> Reset </button>
      </div>
     </div><!-- Transaction List -->
     <div id="transactionList" class="flex-1 overflow-auto p-4 space-y-2">
      <p class="text-slate-400 text-center mt-4">Belum ada scan</p>
     </div>
    </div>
   </main><!-- Database View (Admin) -->
   <div id="databaseView" class="hidden flex-1 flex flex-col overflow-hidden bg-slate-900">
    <!-- Products List -->
    <div class="flex-1 overflow-auto p-4">
     <h2 class="text-lg font-bold text-white mb-4">Database Produk</h2>
     <div id="productsList" class="space-y-2">
      <!-- Products will be listed here -->
     </div>
    </div>
   </div>
  </div>
  <script src="/_sdk/element_sdk.js"></script>
  <script>
    // Demo Database - Produk
    const demoProducts = [
      { id: 1, barcode: '8801001001', ctg: 'Minuman', nama: 'Coca Cola', produk: 'Coca Cola 350ml', harga: 6500 },
      { id: 2, barcode: '8801001002', ctg: 'Minuman', nama: 'Sprite', produk: 'Sprite 350ml', harga: 6500 },
      { id: 3, barcode: '8801001003', ctg: 'Snack', nama: 'Chitato', produk: 'Chitato Rasa Original', harga: 8000 },
      { id: 4, barcode: '8801001004', ctg: 'Snack', nama: 'Doritos', produk: 'Doritos Nacho Cheese', harga: 8500 },
      { id: 5, barcode: '8801001005', ctg: 'Makanan', nama: 'Indomie', produk: 'Indomie Goreng', harga: 3500 },
      { id: 6, barcode: '8801001006', ctg: 'Makanan', nama: 'Mie Sedaap', produk: 'Mie Sedaap Rasa Soto', harga: 3000 },
      { id: 7, barcode: '8801001007', ctg: 'Minuman', nama: 'Fanta', produk: 'Fanta Orange 350ml', harga: 6500 },
      { id: 8, barcode: '8801001008', ctg: 'Snack', nama: 'Pringles', produk: 'Pringles Original', harga: 12000 },
      { id: 9, barcode: '8999909001909', ctg: 'Makanan', nama: 'Magnum', produk: 'Magnum Ice Cream', harga: 10000 },
    ];

    // State
    let transactions = [];
    let cameraActive = false;
    let currentMode = 'scanner'; // scanner, list, database

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      initializeCamera();
      setupEventListeners();
      displayProducts();
    });

    // Setup Event Listeners
    function setupEventListeners() {
      document.getElementById('toggleMode').addEventListener('click', toggleMode);
      document.getElementById('submitManual').addEventListener('click', submitManualBarcode);
      document.getElementById('manualBarcode').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') submitManualBarcode();
      });
      document.getElementById('resetBtn').addEventListener('click', resetTransactions);
    }

    // Toggle Mode
    function toggleMode() {
      currentMode = currentMode === 'scanner' ? 'list' : 'scanner';
      
      document.getElementById('scannerView').classList.toggle('hidden');
      document.getElementById('listView').classList.toggle('hidden');
      document.getElementById('toggleMode').textContent = currentMode === 'scanner' ? 'Mode: Scanner' : 'Mode: List';
      
      if (currentMode === 'scanner') {
        cameraActive = true;
        document.getElementById('cameraFeed').play();
      } else {
        cameraActive = false;
        document.getElementById('cameraFeed').pause();
      }
    }

    // Initialize Camera
    async function initializeCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        
        const video = document.getElementById('cameraFeed');
        video.srcObject = stream;
        cameraActive = true;
        
        // Start barcode detection
        detectBarcodes();
      } catch (err) {
        console.error('Kamera tidak tersedia:', err);
        showNotification('Kamera tidak tersedia. Gunakan input manual.', 'error');
      }
    }

    // Detect Barcodes (Demo - menggunakan input manual)
    async function detectBarcodes() {
      if (!cameraActive) return;
      
      try {
        const canvas = document.createElement('canvas');
        const video = document.getElementById('cameraFeed');
        const ctx = canvas.getContext('2d');
        
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        
        // Note: Untuk production, gunakan library seperti quagga.js atau ml-barcode-detector
        // Di sini menggunakan demo mode
        
        requestAnimationFrame(detectBarcodes);
      } catch (err) {
        console.error('Error detecting barcode:', err);
      }
    }

    // Submit Manual Barcode
    function submitManualBarcode() {
      const input = document.getElementById('manualBarcode');
      const barcode = input.value.trim();
      
      if (!barcode) {
        showNotification('Masukkan barcode terlebih dahulu', 'error');
        return;
      }
      
      const product = demoProducts.find(p => p.barcode === barcode);
      
      if (!product) {
        showNotification(`Barcode "${barcode}" tidak ditemukan`, 'error');
        input.value = '';
        input.focus();
        return;
      }
      
      addTransaction(product);
      input.value = '';
      input.focus();
    }

    // Add Transaction
    function addTransaction(product) {
      const transaction = {
        id: Date.now(),
        ...product,
        timestamp: new Date().toLocaleTimeString('id-ID')
      };
      
      transactions.push(transaction);
      renderTransactions();
      showNotification(`${product.nama} ditambahkan ✓`, 'success');
    }

    // Render Transactions
    function renderTransactions() {
      const list = document.getElementById('transactionList');
      const totalItems = document.getElementById('totalItems');
      const totalPrice = document.getElementById('totalPrice');
      
      if (transactions.length === 0) {
        list.innerHTML = '<p class="text-slate-400 text-center mt-4">Belum ada scan</p>';
        totalItems.textContent = '0';
        totalPrice.textContent = 'Rp 0';
        return;
      }
      
      list.innerHTML = transactions.map((t, idx) => `
        <div class="bg-slate-800 border border-slate-700 rounded-lg p-3 slide-in flex items-start justify-between">
          <div class="flex-1">
            <div class="flex items-start gap-2">
              <span class="text-slate-500 text-sm font-mono">${idx + 1}.</span>
              <div class="flex-1">
                <p class="text-white font-semibold">${t.nama}</p>
                <p class="text-xs text-slate-400">${t.produk}</p>
                <p class="text-xs text-slate-500 mt-1">
                  <span class="bg-slate-700 px-2 py-0.5 rounded">Barcode: ${t.barcode}</span>
                </p>
              </div>
            </div>
          </div>
          <div class="text-right ml-2">
            <p class="text-green-400 font-bold">Rp ${t.harga.toLocaleString('id-ID')}</p>
            <button 
              onclick="removeTransaction(${t.id})"
              class="text-xs text-red-400 hover:text-red-300 mt-1"
            >
              Hapus
            </button>
          </div>
        </div>
      `).join('');
      
      // Update totals
      const total = transactions.reduce((sum, t) => sum + t.harga, 0);
      totalItems.textContent = transactions.length;
      totalPrice.textContent = `Rp ${total.toLocaleString('id-ID')}`;
    }

    // Remove Transaction
    function removeTransaction(id) {
      transactions = transactions.filter(t => t.id !== id);
      renderTransactions();
    }

    // Reset Transactions
    function resetTransactions() {
      if (transactions.length === 0) return;
      transactions = [];
      renderTransactions();
      showNotification('Transaksi direset', 'success');
    }

    // Display Products (Database View)
    function displayProducts() {
      const list = document.getElementById('productsList');
      list.innerHTML = demoProducts.map(p => `
        <div class="bg-slate-800 border border-slate-700 rounded-lg p-3">
          <div class="flex items-start justify-between">
            <div class="flex-1">
              <p class="text-white font-semibold">${p.nama}</p>
              <p class="text-xs text-slate-400">${p.produk}</p>
              <p class="text-xs text-slate-500 mt-1">
                <span class="bg-slate-700 px-2 py-0.5 rounded">ID: ${p.id}</span>
                <span class="bg-slate-700 px-2 py-0.5 rounded ml-1">Barcode: ${p.barcode}</span>
              </p>
              <p class="text-xs text-slate-500 mt-1">
                <span class="bg-blue-900 text-blue-200 px-2 py-0.5 rounded">${p.ctg}</span>
              </p>
            </div>
            <div class="text-right">
              <p class="text-green-400 font-bold text-lg">Rp ${p.harga.toLocaleString('id-ID')}</p>
            </div>
          </div>
        </div>
      `).join('');
    }

    // Notification
    function showNotification(message, type = 'info') {
      const notification = document.createElement('div');
      notification.className = `fixed top-4 right-4 px-4 py-2 rounded-lg text-white font-semibold z-50 slide-in ${
        type === 'success' ? 'bg-green-600' : type === 'error' ? 'bg-red-600' : 'bg-blue-600'
      }`;
      notification.textContent = message;
      document.body.appendChild(notification);
      
      setTimeout(() => notification.remove(), 3000);
    }
  </script>

</html>
